name: Test Audio Library

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --group dev

    - name: Test imports
      run: |
        uv run python -c "from audio_lib.core.audio_config import AudioConfig; print('✓ Core imports work')"
        uv run python -c "from audio_lib.synthesis.oscillators import SineWave; print('✓ Synthesis imports work')"
        uv run python -c "from audio_lib.instruments.basic_instruments import Piano; print('✓ Instruments imports work')"

    - name: Test basic functionality
      run: |
        uv run python -c "
        from audio_lib.core.audio_config import AudioConfig
        from audio_lib.synthesis.oscillators import SineWave
        config = AudioConfig()
        sine = SineWave(config)
        samples = sine.generate(440, 0.1)
        print(f'✓ Generated {len(samples)} samples')
        assert len(samples) > 0, 'No samples generated'
        print('✓ All tests passed')
        "
