name: CI Lite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  quick-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: uv sync --group dev

    - name: Lint with flake8 (critical errors only)
      timeout-minutes: 2
      run: |
        uv run flake8 audio_lib/ --count --select=E9,F63,F7,F82 --show-source --statistics --max-line-length=127

    - name: Quick test
      timeout-minutes: 5
      run: |
        uv run pytest tests/test_oscillators.py -v
