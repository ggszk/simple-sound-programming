name: CI Lite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  quick-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: uv sync --group dev

    - name: Lint with ruff (critical errors only)
      timeout-minutes: 2
      run: uv run ruff check audio_lib/

    - name: Quick test
      timeout-minutes: 5
      run: |
        uv run pytest tests/test_oscillators.py -v
